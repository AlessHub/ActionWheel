name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - 'repo.json'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        shell: pwsh
        run: |
          $xml = [xml](Get-Content "ActionWheel/ActionWheel.csproj")
          $version = ($xml.Project.PropertyGroup | Where-Object { $_.Version } | Select-Object -First 1).Version
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Build
        run: dotnet build ActionWheel.sln --configuration Release -p:Platform=x64

      - name: Package
        shell: pwsh
        run: |
          $outDir = "ActionWheel/bin/x64/Release/ActionWheel"
          if (-not (Test-Path $outDir)) {
            Write-Error "Build output not found at $outDir"
            Get-ChildItem "ActionWheel/bin" -Recurse -Directory | Select-Object -ExpandProperty FullName
            exit 1
          }
          Compress-Archive -Path "$outDir/*" -DestinationPath "latest.zip"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          files: latest.zip
          make_latest: true

      - name: Update repo.json
        shell: pwsh
        run: |
          $repo = Get-Content "repo.json" | ConvertFrom-Json
          $repo[0].AssemblyVersion = "${{ steps.version.outputs.version }}"
          $repo[0].LastUpdate = [int][DateTimeOffset]::UtcNow.ToUnixTimeSeconds()
          $repo | ConvertTo-Json -Depth 5 | Set-Content "repo.json"

      - name: Commit repo.json
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add repo.json
          if ((git diff --staged --name-only) -contains "repo.json") {
            git commit -m "ci: update repo.json for v${{ steps.version.outputs.version }} [skip ci]"
            git push
          }
